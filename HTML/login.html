<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FacilitaSaúde</title>
    <link rel="stylesheet" href="/CSS/login.css">
</head>
<body>
    <div class="login-container">
        <div class="gov-logo">Facilita<span>Saúde</span></div>
        <h2>Identifique-se no gov.br</h2>
        <p class="subtitle">Digite seus dados pessoais para acessar sua conta única.</p>

        <form id="loginForm">
            <div class="input-field">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>
            </div>

            <div class="input-field">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="14" required>
            </div>
            
            <div class="input-field">
                <label for="rg">RG</label>
                <input type="text" id="rg" name="rg" placeholder="00.000.000-0" maxlength="12" required>
            </div>

            <div class="input-field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="nome@exemplo.com" required>
            </div>
            
            <div class="input-field">
                <label for="password">Senha</label>
                <input type="password" id="password" name="senha" placeholder="Digite sua senha" required>
            </div>

            <button type="submit" class="login-btn">Avançar</button>
        </form>

        <div class="gov-links">
            <a href="/password.html">Esqueci minha senha</a>
            <a href="/privacidade.html">Termos de uso e privacidade</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        form.addEventListener('submit', function(event) {
            event.preventDefault();
            const nome = document.getElementById('nome').value.trim();
            const cpf = document.getElementById('cpf').value.trim();
            const rg = document.getElementById('rg').value.trim();
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('password').value;

            if (!nome || !cpf || !rg || !email || !senha) {
                alert('Preencha todos os campos antes de avançar.');
                return;
            }

            if (!isValidEmail(email)) {
                alert('Digite um e-mail válido.');
                return;
            }

            const userData = { nome, cpf, rg, email, senha };
            localStorage.setItem('facilitaSaudeUser', JSON.stringify(userData));
            window.location.href = 'user-cadastrado.html';
        });
    </script>
</body>
</html>
